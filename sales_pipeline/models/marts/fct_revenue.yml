version: 2

models:
    - name: fct_revenue
      description: "Fact table for revenue data."
      meta:
        metrics:  
          total_revenue_metric:
            type: sum
            sql: '${TABLE}.REVENUE'
            label: "Total Revenue"
            description: "Total revenue generated from sales."
            
      columns:
        - name: order_id
          description: "Unique identifier for each sale."
          meta:
            dimension:
              type: string
              label: "Sales ID"

        - name: product_id
          description: "Identifier for the product sold."
          meta:
            dimension:
              type: string
              label: "Product ID"

        - name: REVENUE
          description: "Total amount of the sale."
          meta:
            dimension:
              type: number
              label: "Total Amount"
